<div class="flex flex-col min-h-screen">

  <!-- Header -->
  <app-header (toggleSidebar)="toggleSidebar()"></app-header>

  <!-- Main content -->
  <div class="flex flex-1">
    <!-- Sidebar - Hidden on mobile, visible on md+ or when open -->
    <aside class="fixed inset-y-0 left-0 z-50 w-64 bg-base-200 p-4 transform transition-transform duration-300 md:relative md:translate-x-0"
           [class.translate-x-0]="sidebarOpen() || false"
           [class.-translate-x-full]="!sidebarOpen()">
      <app-sidebar></app-sidebar>
    </aside>

    <!-- Overlay for mobile -->
    @if (sidebarOpen()) {
    <div class="fixed inset-0 bg-black bg-opacity-50 z-40 md:hidden" (click)="sidebarOpen.set(false)"></div>
    }

    <!-- Router outlet content -->
    <main class="flex-1 p-6 bg-base-100 overflow-x-auto md:ml-0" [class.ml-64]="sidebarOpen()">
      <router-outlet></router-outlet>
    </main>
  </div>

  <!-- Footer -->
  <app-footer></app-footer>

</div>
